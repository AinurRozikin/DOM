<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="app.css">
    <title>Document</title>
</head>
<body>
    <div class="scoreboard container d-flex flex-column justify-content-center">
        <div class="row row-cols-1 row-cols-md-2 text-center py-5 justify-content-center">
            <div class="points col col-auto py-3 d-flex flex-column align-items-center">
                <h2 class="home">Player 1</h2>
                <p class="px-3" id="display-1">0</p>
                <div class="score-btns">
                    <button class="btn btn-primary" id="player-1">+1</button>
                </div>
            </div>
            <div class="points col col-auto py-3 d-flex flex-column align-items-center">
                <h2 class="home">Player 2</h2>
                <p class="px-3" id="display-2">0</p>
                <div class="score-btns">
                    <button class="btn btn-primary" id="player-2">+1</button>
                </div>
            </div>
        </div>
        <div class="d-grid gap-2 col-4 col-md-4 mx-auto pb-5">
            <select class="form-select" id="select">
                <option value="3">3</option>
                <option value="5">5</option>
                <option value="10">10</option>
            </select>
        </div>
        <div class="d-grid gap-2 col-2 col-4 mx-auto pb-5">
            <button class="btn btn-primary" id="clearDisplay">bersihkan</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
